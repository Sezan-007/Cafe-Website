<!DOCTYPE html>
<html>
<head>
<title>Contact Us</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>
  .error-msg { font-size: 12px; color: #dc3545; margin-top: 4px; display: none; }
  .field.invalid .form-control { border-color: #dc3545; }
  .field.invalid .error-msg { display: block; }
  .field.valid .form-control { border-color: #198754; }
  .char-count { font-size: 11px; color: #888; text-align: right; margin-top: 4px; }
  #successMsg { display: none; }
</style>
</head>

<body>

<div class="container mt-5">

  <h2>Contact Us</h2>

  <form id="contactForm">

    <div class="mb-3 field" id="field-name">
      <label>Name</label>
      <input type="text" id="name" class="form-control" placeholder="Your full name">
      <div class="error-msg" id="err-name">Name must be at least 3 characters.</div>
    </div>

    <div class="mb-3 field" id="field-email">
      <label>Email</label>
      <input type="email" id="email" class="form-control" placeholder="you@example.com">
      <div class="error-msg" id="err-email">Please enter a valid email address.</div>
    </div>

    <div class="mb-3 field" id="field-message">
      <label>Message</label>
      <textarea id="message" class="form-control" placeholder="Write your message here..."></textarea>
      <div class="char-count"><span id="charCount">0</span> / 500</div>
      <div class="error-msg" id="err-message">Message must be between 10 and 500 characters.</div>
    </div>

    <button type="submit" class="btn btn-warning">Send</button>

    <div id="successMsg" class="alert alert-success mt-3">
      Message sent! We'll be in touch soon.
    </div>

  </form>

</div>

<script src="js/script.js"></script>

</body>
</html>
